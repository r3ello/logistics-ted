<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick location</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/leaflet.css" />
  <script src="/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Golos Text', 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; -webkit-font-smoothing: antialiased; }
    #toolbar {
      padding: 0.75rem 1rem; background: rgba(26,29,39,0.92); border-bottom: 1px solid #2e3250;
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35); z-index: 500; position: relative;
    }
    #hint { font-size: 0.85rem; color: #9aa3be; }
    #coords { font-size: 0.85rem; color: #4f8ef7; font-family: 'IBM Plex Mono', Consolas, monospace; font-weight: 500; }
    #map { flex: 1; }
    #confirmBtn {
      padding: 0.5rem 1.2rem; background: linear-gradient(180deg, #5d9bf8, #3f7ce8); color: #fff; border: none;
      border-radius: 9px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit;
      box-shadow: 0 2px 10px rgba(79,142,247,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
      transition: filter 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    #confirmBtn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    #confirmBtn:not(:disabled):hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,247,0.45), inset 0 1px 0 rgba(255,255,255,0.12); }
    #confirmBtn:not(:disabled):active { transform: scale(0.97); }
    /* dark-theme map cohesion (matches index.html) */
    .leaflet-tile-pane { filter: brightness(0.82) contrast(1.06) saturate(0.85); }
    .leaflet-bar a { background: #1a1d27; color: #e2e8f0; border-bottom-color: #2e3250; }
    .leaflet-bar a:hover { background: #21253a; color: #fff; }
    .leaflet-control-attribution { background: rgba(26,29,39,0.78); color: #9aa3be; }
    .leaflet-control-attribution a { color: #4f8ef7; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div>
      <div id="hint">Click on the map to place the starting pin</div>
      <div id="coords"></div>
    </div>
    <button id="confirmBtn" disabled>Confirm location</button>
  </div>
  <div id="map"></div>

  <script>
    // Fix default icon paths when serving locally
    delete L.Icon.Default.prototype._getIconUrl;
    L.Icon.Default.mergeOptions({
      iconUrl: '/marker-icon.png',
      iconRetinaUrl: '/marker-icon-2x.png',
      shadowUrl: '/marker-shadow.png',
    });

    let marker = null;
    let picked = null;

    const map = L.map('map').setView([42.7, 25.4], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 18,
    }).addTo(map);

    map.on('click', function(e) {
      const { lat, lng } = e.latlng;
      picked = { lat, lng };
      if (marker) {
        marker.setLatLng([lat, lng]);
      } else {
        marker = L.marker([lat, lng], { draggable: true }).addTo(map);
        marker.on('dragend', function() {
          const p = marker.getLatLng();
          picked = { lat: p.lat, lng: p.lng };
          showCoords();
        });
      }
      showCoords();
    });

    function showCoords() {
      document.getElementById('coords').textContent =
        picked.lat.toFixed(5) + ', ' + picked.lng.toFixed(5);
      document.getElementById('confirmBtn').disabled = false;
      document.getElementById('hint').textContent = 'Drag the pin to adjust, then confirm';
    }

    document.getElementById('confirmBtn').addEventListener('click', function() {
      if (!picked) return;
      localStorage.setItem('mapPin', JSON.stringify({ lat: picked.lat, lng: picked.lng }));
      if (!localStorage.getItem('returnToHouseModal') && !localStorage.getItem('returnToView')) {
        localStorage.setItem('returnToOrder', '1');
      }
      window.location.href = '/';
    });
  </script>
</body>
</html>

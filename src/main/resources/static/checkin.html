<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TEDHOUSE – Check In/Out</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--card:#21253a;--border:#2e3250;
      --accent:#4f8ef7;--green:#3ecf6e;--red:#f76f6f;--yellow:#f5c842;
      --gray:#9aa3be;--text:#e2e8f0;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
    .header{text-align:center;margin-bottom:1.5rem}
    .header h1{font-size:1.3rem;font-weight:700;color:var(--accent)}
    .header p{font-size:.85rem;color:var(--gray);margin-top:.3rem}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:1.5rem;width:100%;max-width:420px}
    label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.07em;color:var(--gray);margin-bottom:.5rem}
    input[type=text],input[type=password]{
      width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
      color:var(--text);font-size:1rem;padding:.75rem 1rem;outline:none;margin-bottom:1rem}
    input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
    .btn{width:100%;padding:1.4rem;border:none;border-radius:12px;font-size:1.25rem;font-weight:700;
      cursor:pointer;margin-top:0.5rem;transition:opacity .15s}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-in {background:var(--green);color:#0f1117}
    .btn-out{background:var(--yellow);color:#0f1117}
    .btn-logout{width:auto;padding:0.5rem 1.2rem;font-size:0.82rem;font-weight:600;
      background:transparent;border:1px solid var(--border);color:var(--gray);
      border-radius:8px;cursor:pointer;margin-top:0}
    .status-box{background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:1rem;margin:1rem 0;text-align:center}
    .status-box .time{font-size:1.4rem;font-weight:700;color:var(--accent);margin:.3rem 0}
    .status-box .label{font-size:.78rem;color:var(--gray);text-transform:uppercase;letter-spacing:.07em}
    .msg{text-align:center;padding:.75rem 1rem;border-radius:8px;margin-top:1rem;font-size:.88rem;font-weight:600}
    .msg-ok  {background:rgba(62,207,110,.12);color:var(--green);border:1px solid rgba(62,207,110,.3)}
    .msg-err {background:rgba(247,111,111,.12);color:var(--red);border:1px solid rgba(247,111,111,.3)}
    .msg-info{background:rgba(79,142,247,.1);color:var(--accent);border:1px solid rgba(79,142,247,.25)}
    .session-done{text-align:center}
    .session-done .hours{font-size:2rem;font-weight:700;color:var(--green);margin:.5rem 0}
    .session-done .sub{font-size:.82rem;color:var(--gray)}
    .worker-bar{display:flex;align-items:center;justify-content:space-between;
      margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
    .worker-bar .name{font-weight:700;font-size:0.95rem}
    .worker-bar .role{font-size:0.75rem;color:var(--gray);margin-top:0.1rem}
  </style>
</head>
<body>

<div class="header">
  <h1>⚡ TEDHOUSE</h1>
  <p id="houseName">Loading…</p>
</div>

<div id="mainCard" class="card">
  <div id="screenLogin">
    <div id="loginMsg" style="display:none" class="msg"></div>
    <label>Username</label>
    <input id="loginUser" type="text" autocomplete="username" placeholder="your.username">
    <label>Password</label>
    <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="btn btn-in" onclick="doLogin()">🔑 Login</button>
  </div>

  <div id="screenAction" style="display:none">
    <div class="worker-bar">
      <div>
        <div class="name" id="workerName"></div>
        <div class="role" id="workerRole"></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
    <div id="actionArea"></div>
    <div id="msgBox" style="display:none" class="msg"></div>
    <div style="margin-top:1.25rem;display:flex;align-items:center;gap:.5rem;opacity:.55">
      <input type="checkbox" id="skipGps" style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent)">
      <label for="skipGps" style="font-size:.72rem;margin:0;text-transform:none;letter-spacing:0;cursor:pointer">Skip location check (testing only)</label>
    </div>
  </div>
</div>

<script>
const houseToken = location.pathname.split('/').filter(Boolean).pop();
let deviceId = null;
let currentWorkerId = null;

function getDeviceId() {
  let id = localStorage.getItem('tdhDeviceId');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('tdhDeviceId', id); }
  return id;
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  deviceId = getDeviceId();
  try {
    const res = await fetch(`/api/public/checkin/${houseToken}`);
    if (!res.ok) {
      document.getElementById('houseName').textContent = '⚠️ Invalid check-in point';
      document.getElementById('mainCard').style.display = 'none';
      return;
    }
    const data = await res.json();
    document.getElementById('houseName').textContent = '📍 ' + data.houseName;
  } catch(e) {
    document.getElementById('houseName').textContent = '⚠️ Connection error';
  }
  document.getElementById('loginUser').focus();
}

// ── Login ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const msgEl = document.getElementById('loginMsg');

  const showErr = (txt) => {
    msgEl.textContent = txt; msgEl.className = 'msg msg-err'; msgEl.style.display = 'block';
  };

  if (!username || !password) { showErr('Please enter your username and password.'); return; }
  msgEl.textContent = 'Logging in…'; msgEl.className = 'msg msg-info'; msgEl.style.display = 'block';

  try {
    const res = await fetch('/api/worker-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, houseToken })
    });
    const data = await res.json();
    if (!res.ok) { showErr('❌ ' + (data.error || 'Login failed.')); return; }

    currentWorkerId = data.workerId;
    document.getElementById('workerName').textContent = '👷 ' + data.workerName;
    document.getElementById('workerRole').textContent = data.houseName ? '📍 ' + data.houseName : '';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    msgEl.style.display = 'none';

    document.getElementById('screenLogin').style.display = 'none';
    document.getElementById('screenAction').style.display = 'block';

    await loadTodayStatus();
  } catch(e) { showErr('❌ ' + e.message); }
}

document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Logout ────────────────────────────────────────────────────────────────────
function doLogout() {
  currentWorkerId = null;
  document.getElementById('actionArea').innerHTML = '';
  hideMsg();
  document.getElementById('screenAction').style.display = 'none';
  document.getElementById('screenLogin').style.display = 'block';
  document.getElementById('loginUser').focus();
}

// ── Today status ──────────────────────────────────────────────────────────────
async function loadTodayStatus() {
  try {
    const res  = await fetch(`/api/public/checkin/${houseToken}/worker/${currentWorkerId}/today`);
    const data = await res.json();
    renderAction(data);
  } catch(e) { showMsg('❌ Failed to load status: ' + e.message, 'err'); }
}

function renderAction(data) {
  const area = document.getElementById('actionArea');
  hideMsg();

  if (data.status === 'NONE') {
    area.innerHTML = `
      <div class="status-box"><div class="label">Not checked in today</div></div>
      <button class="btn btn-in" onclick="doCheckIn()">✅ Check In</button>`;

  } else if (data.status === 'CHECKED_IN') {
    area.innerHTML = `
      <div class="status-box">
        <div class="label">Checked in at</div>
        <div class="time">${fmtTime(data.checkedInAt)}</div>
      </div>
      <button class="btn btn-out" onclick="doCheckOut(${data.sessionId})">🚪 Check Out</button>`;

  } else {
    const count = data.sessionCount || 1;
    area.innerHTML = `
      <div class="session-done">
        <div class="label" style="color:var(--green);font-size:.75rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem">
          Session complete${count > 1 ? ' (' + count + ' today)' : ''}</div>
        <div class="hours">${fmtDuration(data.durationMinutes)}</div>
        <div class="sub">${fmtTime(data.checkedInAt)} → ${fmtTime(data.checkedOutAt)}</div>
      </div>
      <button class="btn btn-in" style="margin-top:1rem" onclick="doCheckIn()">✅ Check In Again</button>`;
  }
}

// ── Check In ──────────────────────────────────────────────────────────────────
async function doCheckIn() {
  let lat = null, lng = null;
  if (!document.getElementById('skipGps').checked) {
    showMsg('📍 Getting your location…', 'info');
    try {
      const pos = await getPosition();
      lat = pos.coords.latitude; lng = pos.coords.longitude;
    } catch(e) {
      showMsg('❌ Location access is required. Please allow location and try again.', 'err');
      return;
    }
  }
  showMsg('Checking in…', 'info');
  try {
    const res  = await fetch(`/api/public/checkin/${houseToken}/session`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ workerId: currentWorkerId, deviceId, lat, lng })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('❌ ' + data.error, 'err'); return; }
    showMsg('✅ Checked in at ' + fmtTime(data.checkedInAt), 'ok');
    await loadTodayStatus();
  } catch(e) { showMsg('❌ ' + e.message, 'err'); }
}

// ── Check Out ─────────────────────────────────────────────────────────────────
async function doCheckOut(sessionId) {
  let lat = null, lng = null;
  if (!document.getElementById('skipGps').checked) {
    showMsg('📍 Getting your location…', 'info');
    try {
      const pos = await getPosition();
      lat = pos.coords.latitude; lng = pos.coords.longitude;
    } catch(e) {
      showMsg('❌ Location access is required. Please allow location and try again.', 'err');
      return;
    }
  }
  showMsg('Checking out…', 'info');
  try {
    const res  = await fetch(`/api/public/checkin/${houseToken}/session/${sessionId}/checkout`, {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ deviceId, lat, lng })
    });
    const data = await res.json();
    if (!res.ok) { showMsg('❌ ' + data.error, 'err'); return; }
    showMsg('✅ Checked out — ' + fmtDuration(data.durationMinutes) + ' today', 'ok');
    await loadTodayStatus();
  } catch(e) { showMsg('❌ ' + e.message, 'err'); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getPosition() {
  return new Promise((resolve, reject) =>
    navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000, maximumAge: 0 }));
}
function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
function fmtDuration(mins) {
  if (mins == null) return '—';
  const h = Math.floor(mins / 60), m = mins % 60;
  return h > 0 ? `${h}h ${m.toString().padStart(2,'0')}m` : `${m}m`;
}
function showMsg(text, type) {
  const el = document.getElementById('msgBox');
  el.textContent = text; el.className = 'msg msg-' + type; el.style.display = 'block';
}
function hideMsg() { document.getElementById('msgBox').style.display = 'none'; }

init();
</script>
</body>
</html>

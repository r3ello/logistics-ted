spring:
  application:
    name: logistics-ted

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

routing:
  #provider: ${ROUTING_PROVIDER:haversine}
  provider: ${ROUTING_PROVIDER:google}
  google:
    api-key: ${ROUTING_GOOGLE_API_KEY}
    base-url: https://routes.googleapis.com
    travel-mode: DRIVE
    routing-preference: TRAFFIC_AWARE
    request-timeout-seconds: 5
  haversine:
    # Used to estimate travel time when provider=haversine (Google supplies real durations).
    speed-kmh: ${ROUTING_HAVERSINE_KMH:40}
  balanced:
    # Weights for the "balanced" objective: cost = alpha * km + beta * minutes.
    alpha: ${ROUTING_BALANCED_ALPHA:1.0}
    beta: ${ROUTING_BALANCED_BETA:1.0}
  cache:
    ttl-seconds: 86400
    max-size: 50000

management:
  endpoints:
    web:
      exposure:
        # Only expose /actuator/health — nothing else (avoids leaking env, beans, mappings, etc.)
        include: health
  endpoint:
    health:
      # Container healthcheck only needs liveness; don't gate it on DB readiness or Flyway state.
      show-details: never
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:3002}
  servlet:
    session:
      timeout: 8h
      cookie:
        http-only: true
        same-site: lax
        name: TEDHOUSE_SESSION

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    com.bellgado.logistics_ted: INFO
    # Flip to DEBUG to see per-objective stop IDs, exhaustive vs greedy mode picks,
    # and cache hit/miss detail. Useful when investigating why N alternatives didn't appear.
    # com.bellgado.logistics_ted.service.RouteOptimizationService: DEBUG
    # com.bellgado.logistics_ted.service.solver.HeuristicRouteSolver: DEBUG
    # com.bellgado.logistics_ted.service.distance: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
